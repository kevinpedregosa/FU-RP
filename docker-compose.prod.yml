# Run with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: "3.9"

services:
  backend:
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: WARNING
      ALLOWED_ORIGINS: "${FRONTEND_URL}"
    restart: always
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  frontend:
    build:
      args:
        NEXT_PUBLIC_API_URL: "${BACKEND_URL}"
    restart: always
